<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술어 논리 추론 도구</title>
<style>
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumMedium.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumBold.woff') format('woff');
  font-weight: 700;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #6b8c63;
  color: #f2f1df;
  font-family: 'KoPub World 돋움', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px; gap: 14px;
}
h1 { font-size: 1.15rem; color: #f2f1df; }
.subtitle { font-size: .72rem; color: #b0c4a0; text-align: center; }
.section {
  width: 100%; max-width: 820px;
  background: #567050; border: 2px solid #4d6646;
  border-radius: 12px; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.sec-title {
  font-size: .92rem; font-weight: 700; color: #f2f1df;
  display: flex; align-items: center; gap: 8px;
}
.sec-num {
  background: #e8a0aa; color: #2a1a1a;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700; flex-shrink: 0;
}
input[type=text] {
  padding: 7px 10px; background: #f2f1df; color: #2a3820;
  border: 2px solid #4d6646; border-radius: 7px;
  font-size: .85rem; font-family: inherit;
}
input[type=text]:focus { outline: none; border-color: #e8a0aa; }
button {
  padding: 7px 14px; border: none; border-radius: 7px;
  cursor: pointer; font-size: .82rem; font-family: inherit; transition: background .12s;
}
.btn-add  { background: #4d6646; color: #f2f1df; }
.btn-add:hover  { background: #3d5236; }
.btn-main { background: #e8a0aa; color: #2a1a1a; font-weight: 700; }
.btn-main:hover { background: #f0b0bc; }
.btn-del  { background: #7a3a3a; color: #fcc; padding: 3px 8px; font-size: .75rem; }
.btn-del:hover { background: #6a2a2a; }

/* 속성 태그 */
.pred-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pred-tag {
  display: flex; align-items: center; gap: 4px;
  background: #4d6646; border: 1px solid #3d5236;
  border-radius: 14px; padding: 4px 10px; font-size: .82rem;
}
.pred-del { cursor: pointer; color: #e8a0aa; }
.pred-del:hover { color: #f0b0bc; }

/* 학생 표 */
.table-wrap { overflow-x: auto; }
table { border-collapse: collapse; font-size: .82rem; }
th, td { border: 1px solid #4d6646; padding: 7px 12px; text-align: center; white-space: nowrap; }
thead th { background: #4d6646; color: #f2f1df; font-weight: 700; }
thead th.pred-col { background: #3d5236; }
tbody td { background: #f2f1df; color: #2a3820; }
tbody tr:hover td { background: #e8f0d8; }
tbody td:first-child { background: #ddeacc; font-weight: 700; text-align: left; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #4d6646; cursor: pointer; }

/* 명제 카드 */
.stmt-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.stmt-col  { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 6px; }
.col-label { font-size: .78rem; color: #b0c4a0; font-weight: 700; margin-bottom: 2px; }
.stmt-card {
  border-radius: 8px; padding: 10px 13px;
  display: flex; flex-direction: column; gap: 3px;
}
.stmt-card.univ { background: #3d5830; border-left: 4px solid #4ade80; }
.stmt-card.exis { background: #3a4a5a; border-left: 4px solid #93c5fd; }
.stmt-ko    { font-size: .88rem; color: #f2f1df; }
.stmt-ko b  { color: #fde68a; }
.stmt-logic { font-size: .76rem; color: #8aaa78; font-family: monospace; }
.stmt-ex    { font-size: .74rem; color: #86d8a0; }
.stmt-ex-b  { font-size: .74rem; color: #86b8d8; }
.empty-msg  { font-size: .8rem; color: #7a9a70; font-style: italic; }

/* 추론 체크박스 */
.check-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.check-label {
  display: flex; align-items: center; gap: 6px;
  background: #4d6646; border: 1px solid #3d5236;
  border-radius: 14px; padding: 5px 12px;
  font-size: .85rem; cursor: pointer;
}
.check-label:hover { background: #3d5236; }
.check-label input { accent-color: #e8a0aa; width: 15px; height: 15px; }

/* 추론 결과 */
.result-box {
  background: #425740; border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.res-label { font-size: .78rem; color: #b0c4a0; margin-bottom: 4px; }
.tag-row   { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 5px 13px; border-radius: 12px; font-size: .85rem; font-weight: 700;
}
.tag.known   { background: #4d7a5a; color: #c8f0d0; border: 1px solid #6aab7a; }
.tag.derived { background: #b87080; color: #ffe8ec; border: 1px solid #d09098; }
.step-list { display: flex; flex-direction: column; gap: 6px; }
.step {
  background: #4d6646; border-left: 3px solid #e8a0aa;
  border-radius: 8px; padding: 9px 13px;
}
.step-rule { font-size: .75rem; color: #8aaa78; font-family: monospace; }
.step-ko   { font-size: .85rem; color: #f2f1df; margin-top: 3px; }
.step-ko .arr { color: #e8a0aa; font-weight: 700; margin: 0 4px; }
.step-ko .new { color: #fde68a; font-weight: 700; }
.ex-box {
  background: #3a4a5a; border-radius: 8px; padding: 10px 13px;
}
.ex-box-title { font-size: .78rem; color: #93c5fd; font-weight: 700; margin-bottom: 5px; }
.ex-item { font-size: .82rem; color: #c0d0e0; margin-top: 4px; }
</style>
</head>
<body>

<h1>🧠 술어 논리 추론 도구</h1>
<p class="subtitle">학생 데이터 입력 → ∀/∃ 자동 도출 → 새 개체 추론</p>

<!-- ① 데이터 입력 -->
<div class="section">
  <div class="sec-title"><span class="sec-num">1</span> 속성 정의 및 학생 데이터 입력</div>

  <div>
    <div style="font-size:.78rem;color:#b0c4a0;margin-bottom:6px">속성 목록</div>
    <div class="pred-tags" id="predTags">
      <span class="empty-msg">속성을 추가하세요</span>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <input type="text" id="newPred" placeholder="새 속성 (예: 안경씀)" style="width:180px">
      <button class="btn-add" onclick="addPred()">+ 추가</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="dataTable"><thead><tr><th>학생</th></tr></thead><tbody></tbody></table>
  </div>

  <div style="display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap">
    <div style="display:flex;gap:6px">
      <input type="text" id="newStu" placeholder="학생 이름" style="width:130px">
      <button class="btn-add" onclick="addStudent()">+ 학생 추가</button>
    </div>
    <button class="btn-main" onclick="analyze()">🔍 데이터 분석</button>
  </div>
</div>

<!-- ② 도출된 명제 -->
<div class="section" id="sec2" style="display:none">
  <div class="sec-title"><span class="sec-num">2</span> 데이터에서 도출된 명제</div>
  <div class="stmt-grid">
    <div class="stmt-col">
      <div class="col-label">∀ (모든) — 추론에 사용</div>
      <div id="univList"></div>
    </div>
    <div class="stmt-col">
      <div class="col-label">∃ (어떤) — 관찰 기록</div>
      <div id="exisList"></div>
    </div>
  </div>
</div>

<!-- ③ 새 개체 추론 -->
<div class="section" id="sec3" style="display:none">
  <div class="sec-title"><span class="sec-num">3</span> 새 개체로 추론</div>

  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <input type="text" id="indName" placeholder="이름 (예: 지민)" style="width:130px">
    <span style="font-size:.85rem;color:#b0c4a0">에 대해 알고 있는 속성:</span>
  </div>

  <div class="check-grid" id="propChecks">
    <span class="empty-msg">분석 후 속성이 표시됩니다</span>
  </div>

  <button class="btn-main" onclick="doInfer()" style="align-self:flex-start">▶ 추론하기</button>
  <div id="resultArea"></div>
</div>

<script>
'use strict';

let predicates = [];
let students   = [];
let derivedUniv = []; // ∀ from data

// ── 속성 ─────────────────────────────────────────────────────────
function addPred() {
  const v = document.getElementById('newPred').value.trim();
  if (!v) return;
  if (predicates.includes(v)) { alert('이미 있는 속성입니다'); return; }
  predicates.push(v);
  students.forEach(s => { s.props[v] = 0; });
  document.getElementById('newPred').value = '';
  renderPreds(); renderTable();
}

function delPred(p) {
  predicates = predicates.filter(x => x !== p);
  students.forEach(s => delete s.props[p]);
  renderPreds(); renderTable();
}

function renderPreds() {
  const el = document.getElementById('predTags');
  el.innerHTML = predicates.length
    ? predicates.map(p => `<span class="pred-tag">${p}<span class="pred-del" onclick="delPred('${p}')"> ✕</span></span>`).join('')
    : '<span class="empty-msg">속성을 추가하세요</span>';
}

// ── 학생 ─────────────────────────────────────────────────────────
function addStudent() {
  const v = document.getElementById('newStu').value.trim();
  if (!v) return;
  const props = {};
  predicates.forEach(p => props[p] = 0);
  students.push({name: v, props});
  document.getElementById('newStu').value = '';
  renderTable();
}

function delStudent(i) { students.splice(i, 1); renderTable(); }

function toggleProp(si, p, val) { students[si].props[p] = val ? 1 : 0; }

function renderTable() {
  const tbl = document.getElementById('dataTable');
  let h = '<thead><tr><th>학생</th>';
  predicates.forEach(p => { h += `<th class="pred-col">${p}</th>`; });
  h += '<th></th></tr></thead><tbody>';
  students.forEach((s, si) => {
    h += `<tr><td>${s.name}</td>`;
    predicates.forEach(p => {
      h += `<td><input type="checkbox" ${s.props[p]?'checked':''} onchange="toggleProp(${si},'${p}',this.checked)"></td>`;
    });
    h += `<td><button class="btn-del" onclick="delStudent(${si})">삭제</button></td></tr>`;
  });
  h += '</tbody>';
  tbl.innerHTML = h;
}

// ── 분석 ─────────────────────────────────────────────────────────
function analyze() {
  if (!students.length)   { alert('학생을 추가해주세요'); return; }
  if (!predicates.length) { alert('속성을 추가해주세요'); return; }

  const univs = [], exiss = [];
  predicates.forEach(p => {
    const withP = students.filter(s => s.props[p]);
    if (withP.length === students.length)
      univs.push({p, examples: students.map(s => s.name)});
    else if (withP.length > 0)
      exiss.push({p, examples: withP.map(s => s.name)});
  });
  derivedUniv = univs;

  // ∀ 목록
  document.getElementById('univList').innerHTML = univs.length
    ? univs.map(u => `<div class="stmt-card univ">
        <div class="stmt-ko">모든 <b>학생</b>은 <b>${u.p}</b>이다</div>
        <div class="stmt-logic">∀x (학생(x) → ${u.p}(x))</div>
        <div class="stmt-ex">해당: ${u.examples.join(', ')}</div>
      </div>`).join('')
    : '<div class="empty-msg">모든 학생에 해당하는 속성 없음</div>';

  // ∃ 목록
  document.getElementById('exisList').innerHTML = exiss.length
    ? exiss.map(e => `<div class="stmt-card exis">
        <div class="stmt-ko">어떤 <b>학생</b>은 <b>${e.p}</b>이다</div>
        <div class="stmt-logic">∃x (학생(x) ∧ ${e.p}(x))</div>
        <div class="stmt-ex-b">예시: ${e.examples.join(', ')}</div>
      </div>`).join('')
    : '<div class="empty-msg">일부에만 해당하는 속성 없음</div>';

  // 추론용 체크박스
  document.getElementById('propChecks').innerHTML = predicates.map(p => `
    <label class="check-label">
      <input type="checkbox" value="${p}"> ${p}
    </label>`).join('');

  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('sec2').style.display = '';
  document.getElementById('sec3').style.display = '';
}

// ── 추론 ─────────────────────────────────────────────────────────
function doInfer() {
  const name    = document.getElementById('indName').value.trim() || '이 개체';
  const checked = [...document.querySelectorAll('#propChecks input:checked')].map(el => el.value);
  if (!checked.length) { alert('속성을 하나 이상 선택해주세요'); return; }

  const known = new Set(checked);
  const steps = [];

  // ∀ 규칙으로 forward chaining
  let changed = true;
  while (changed) {
    changed = false;
    for (const u of derivedUniv) {
      if (!known.has(u.p)) {
        known.add(u.p);
        steps.push(u);
        changed = true;
      }
    }
  }

  // ∃ 중 확인되는 것
  const allExis = [...document.querySelectorAll('#exisList .stmt-ko b:last-child')]
    .map(el => el.textContent);
  const confirmed = allExis.filter(p => known.has(p));

  const initial  = new Set(checked);
  const derived  = new Set(steps.map(s => s.p));

  let html = `<div class="result-box">`;

  // 처음부터 알던 것
  html += `<div><div class="res-label">처음부터 알고 있던 것</div>
    <div class="tag-row">
      <span class="tag known">학생(${name})</span>`;
  [...initial].forEach(p => { html += `<span class="tag known">${p}(${name})</span>`; });
  html += `</div></div>`;

  if (steps.length) {
    // 추론 과정
    html += `<div><div class="res-label">📎 추론 과정</div><div class="step-list">`;
    steps.forEach(s => {
      html += `<div class="step">
        <div class="step-rule">∀x (학생(x) → ${s.p}(x)) [데이터 기반]</div>
        <div class="step-ko">학생(${name}) 참
          <span class="arr">→</span>
          <span class="new">${s.p}(${name}) 도출!</span>
          &nbsp;→&nbsp; "${name}은(는) <b>${s.p}</b>이다"
        </div>
      </div>`;
    });
    html += `</div></div>`;

    // 새로 알게 된 것
    html += `<div><div class="res-label">추론으로 새로 알게 된 것</div>
      <div class="tag-row">`;
    [...derived].forEach(p => { html += `<span class="tag derived">${p}(${name})</span>`; });
    html += `</div></div>`;
  } else {
    html += `<div style="font-size:.85rem;color:#8aaa78">적용 가능한 ∀ 규칙이 없어 새로 도출된 사실이 없습니다.</div>`;
  }

  // ∃ 확인
  if (confirmed.length) {
    html += `<div class="ex-box">
      <div class="ex-box-title">∃ 확인 — ${name}이(가) '어떤 학생' 명제의 실제 예시</div>`;
    confirmed.forEach(p => {
      html += `<div class="ex-item">"어떤 학생은 <b>${p}</b>이다" → ${name}이(가) 바로 그 예시!</div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('resultArea').innerHTML = html;
}

// ── 키 이벤트 ─────────────────────────────────────────────────────
document.getElementById('newPred').addEventListener('keydown', e => { if(e.key==='Enter') addPred(); });
document.getElementById('newStu') .addEventListener('keydown', e => { if(e.key==='Enter') addStudent(); });
</script>
</body>
</html>
