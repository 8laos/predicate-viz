<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술어 논리 추론 도구</title>
<style>
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumMedium.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumBold.woff') format('woff');
  font-weight: 700;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #6b8c63;
  color: #f2f1df;
  font-family: 'KoPub World 돋움', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  gap: 14px;
}
h1 { font-size: 1.15rem; color: #f2f1df; }
.subtitle { font-size: .72rem; color: #b0c4a0; text-align: center; }

.section {
  width: 100%; max-width: 780px;
  background: #567050;
  border: 2px solid #4d6646;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sec-title {
  font-size: .92rem; font-weight: 700; color: #f2f1df;
  display: flex; align-items: center; gap: 8px;
}
.sec-num {
  background: #e8a0aa; color: #2a1a1a;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700; flex-shrink: 0;
}

/* 입력 */
input[type=text] {
  padding: 7px 10px;
  background: #f2f1df; color: #2a3820;
  border: 2px solid #4d6646; border-radius: 7px;
  font-size: .88rem; font-family: inherit;
}
input[type=text]:focus { outline: none; border-color: #e8a0aa; }
select {
  padding: 7px 10px;
  background: #f2f1df; color: #2a3820;
  border: 2px solid #4d6646; border-radius: 7px;
  font-size: .88rem; font-family: inherit;
}

/* 버튼 */
button {
  padding: 7px 14px; border: none; border-radius: 7px;
  cursor: pointer; font-size: .82rem; font-family: inherit; transition: background .12s;
}
.btn-add  { background: #4d6646; color: #f2f1df; }
.btn-add:hover { background: #3d5236; }
.btn-main { background: #e8a0aa; color: #2a1a1a; font-weight: 700; }
.btn-main:hover { background: #f0b0bc; }
.btn-del  { background: #7a3a3a; color: #fcc; padding: 4px 9px; font-size: .75rem; }
.btn-del:hover { background: #6a2a2a; }

/* 규칙 입력 행 */
.rule-input-row {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  background: #4d6646; border-radius: 8px; padding: 10px 12px;
}
.rule-input-row span { font-size: .88rem; color: #c0d0b0; }

/* 규칙 카드 */
.rule-list { display: flex; flex-direction: column; gap: 6px; }
.rule-card {
  display: flex; align-items: center; gap: 10px;
  border-radius: 8px; padding: 10px 14px;
}
.rule-card.universal  { background: #3d5830; border-left: 4px solid #4ade80; }
.rule-card.existential{ background: #3a4a5a; border-left: 4px solid #93c5fd; }
.rule-ko   { font-size: .88rem; color: #f2f1df; flex: 1; }
.rule-ko b { color: #fde68a; }
.rule-logic{ font-size: .76rem; color: #8aaa78; font-family: monospace; display: block; margin-top: 2px; }
.rule-badge {
  font-size: .7rem; padding: 2px 7px; border-radius: 10px;
  background: #4ade8044; color: #4ade80; flex-shrink: 0;
}
.rule-badge.ex { background: #93c5fd33; color: #93c5fd; }

/* 속성 태그 (추론 입력) */
.prop-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.prop-tag {
  display: flex; align-items: center; gap: 4px;
  background: #4d6646; border: 1px solid #3d5236;
  border-radius: 14px; padding: 4px 10px; font-size: .85rem;
}
.prop-tag-del { cursor: pointer; color: #e8a0aa; font-size: .9rem; }

/* 추론 결과 */
.result-box {
  background: #425740; border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.result-title { font-size: .8rem; color: #b0c4a0; margin-bottom: 4px; }

.known-tags, .derived-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 5px 13px; border-radius: 12px; font-size: .85rem; font-weight: 700;
}
.tag.known   { background: #4d7a5a; color: #c8f0d0; border: 1px solid #6aab7a; }
.tag.derived { background: #b87080; color: #ffe8ec; border: 1px solid #d09098; }

/* 추론 체인 */
.chain { display: flex; flex-direction: column; gap: 8px; }
.chain-step {
  background: #4d6646; border-left: 3px solid #e8a0aa;
  border-radius: 8px; padding: 9px 13px;
}
.chain-rule  { font-size: .75rem; color: #8aaa78; font-family: monospace; }
.chain-ko    { font-size: .85rem; color: #f2f1df; margin-top: 3px; }
.chain-ko .arrow { color: #e8a0aa; font-weight: 700; margin: 0 4px; }
.chain-ko .new   { color: #fde68a; font-weight: 700; }

/* ∃ 참고 */
.ex-note {
  background: #3a4a5a; border-radius: 8px; padding: 10px 13px;
}
.ex-note-title { font-size: .78rem; color: #93c5fd; font-weight: 700; margin-bottom: 5px; }
.ex-note-item  { font-size: .82rem; color: #c0d0e0; margin-top: 4px; }

.empty-msg { font-size: .8rem; color: #7a9a70; font-style: italic; }
.tip { font-size: .7rem; color: #8aaa78; }
</style>
</head>
<body>

<h1>🧠 술어 논리 추론 도구</h1>
<p class="subtitle">규칙을 정의하고 새 개체에 알려진 속성을 입력하면<br>∀ 규칙을 적용해 추론 가능한 사실을 자동으로 도출합니다</p>

<!-- ① 규칙 정의 -->
<div class="section">
  <div class="sec-title"><span class="sec-num">1</span> 규칙 정의</div>

  <div class="rule-input-row">
    <select id="quantifier">
      <option value="all">모든</option>
      <option value="some">어떤</option>
    </select>
    <input type="text" id="ruleA" placeholder="A 속성 (예: 안경씀)" style="width:150px">
    <span>은(는)</span>
    <input type="text" id="ruleB" placeholder="B 속성 (예: 중학교)" style="width:150px">
    <span>이다</span>
    <button class="btn-add" onclick="addRule()">+ 추가</button>
  </div>
  <div class="tip">∀ (모든) 규칙만 추론에 사용됩니다. ∃ (어떤) 규칙은 참고용으로 표시됩니다.</div>

  <div class="rule-list" id="ruleList">
    <div class="empty-msg">아직 정의된 규칙이 없습니다.</div>
  </div>
</div>

<!-- ② 새 개체로 추론 -->
<div class="section">
  <div class="sec-title"><span class="sec-num">2</span> 새 개체로 추론</div>

  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <input type="text" id="indName" placeholder="이름 (예: 민수)" style="width:130px">
    <span style="font-size:.85rem;color:#b0c4a0">의 알려진 속성 선택:</span>
  </div>

  <div id="propChecks">
    <div class="empty-msg">규칙을 먼저 정의하면 속성이 여기 표시됩니다</div>
  </div>

  <button class="btn-main" onclick="doInfer()" style="align-self:flex-start">▶ 추론하기</button>
</div>

<!-- ③ 추론 결과 -->
<div class="section" id="resultSection" style="display:none">
  <div class="sec-title"><span class="sec-num">3</span> 추론 결과</div>
  <div id="resultBox"></div>
</div>

<script>
'use strict';

let rules = []; // {type:'all'|'some', A, B}

// ── 규칙 추가 ──────────────────────────────────────────────────────
function addRule() {
  const type = document.getElementById('quantifier').value;
  const A = document.getElementById('ruleA').value.trim();
  const B = document.getElementById('ruleB').value.trim();
  if (!A || !B) { alert('A와 B 속성을 모두 입력해주세요'); return; }
  if (A === B) { alert('A와 B가 같습니다'); return; }
  if (rules.find(r => r.type===type && r.A===A && r.B===B)) { alert('이미 있는 규칙입니다'); return; }
  rules.push({type, A, B});
  document.getElementById('ruleA').value = '';
  document.getElementById('ruleB').value = '';
  renderRules();
  renderPropChecks();
}

function delRule(i) { rules.splice(i, 1); renderRules(); renderPropChecks(); }

// 규칙에 등장한 속성 전체를 체크박스로 표시
function renderPropChecks() {
  const el = document.getElementById('propChecks');
  const all = new Set();
  rules.forEach(r => { all.add(r.A); all.add(r.B); });
  if (!all.size) {
    el.innerHTML = '<div class="empty-msg">규칙을 먼저 정의하면 속성이 여기 표시됩니다</div>';
    return;
  }
  el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px">` +
    [...all].map(p => `
      <label style="display:flex;align-items:center;gap:5px;background:#4d6646;padding:5px 12px;border-radius:14px;font-size:.85rem;cursor:pointer">
        <input type="checkbox" value="${p}" style="accent-color:#e8a0aa;width:15px;height:15px">
        ${p}
      </label>`).join('') +
    `</div>`;
}

function renderRules() {
  const el = document.getElementById('ruleList');
  if (!rules.length) { el.innerHTML = '<div class="empty-msg">아직 정의된 규칙이 없습니다.</div>'; return; }
  el.innerHTML = rules.map((r, i) => {
    const isAll = r.type === 'all';
    const ko = isAll
      ? `모든 <b>${r.A}</b>은(는) <b>${r.B}</b>이다`
      : `어떤 <b>${r.A}</b>은(는) <b>${r.B}</b>이다`;
    const logic = isAll
      ? `∀x (${r.A}(x) → ${r.B}(x))`
      : `∃x (${r.A}(x) ∧ ${r.B}(x))`;
    return `<div class="rule-card ${isAll?'universal':'existential'}">
      <div style="flex:1">
        <div class="rule-ko">${ko}</div>
        <span class="rule-logic">${logic}</span>
      </div>
      <span class="rule-badge ${isAll?'':'ex'}">${isAll?'∀ 추론 가능':'∃ 참고'}</span>
      <button class="btn-del" onclick="delRule(${i})">삭제</button>
    </div>`;
  }).join('');
}

// ── 추론 ──────────────────────────────────────────────────────────
function doInfer() {
  const name = document.getElementById('indName').value.trim() || '이 개체';
  const checked = [...document.querySelectorAll('#propChecks input:checked')].map(el => el.value);
  if (!checked.length) { alert('알려진 속성을 하나 이상 선택해주세요'); return; }
  if (!rules.filter(r=>r.type==='all').length) { alert('∀ (모든) 규칙을 먼저 정의해주세요'); return; }

  const allRules = rules.filter(r => r.type === 'all');
  const exRules  = rules.filter(r => r.type === 'some');
  const known    = new Set(checked);
  const steps    = []; // {rule, derived}

  // forward chaining
  let changed = true;
  while (changed) {
    changed = false;
    for (const rule of allRules) {
      if (known.has(rule.A) && !known.has(rule.B)) {
        known.add(rule.B);
        steps.push(rule);
        changed = true;
      }
    }
  }

  // ∃ 참고: 알려진 속성 중 ∃ 규칙 A에 해당하는 것
  const exNotes = exRules.filter(r => known.has(r.A));

  // 결과 렌더링
  const derivedSet = new Set(steps.map(s => s.B));
  const initialSet = new Set(checked);

  let html = `<div class="result-box">`;

  // 알고 있던 것
  html += `<div>
    <div class="result-title">처음부터 알고 있던 것</div>
    <div class="known-tags">`;
  [...initialSet].forEach(p => {
    html += `<span class="tag known">${p}(${name})</span>`;
  });
  html += `</div></div>`;

  if (steps.length) {
    // 추론 체인
    html += `<div>
      <div class="result-title">📎 추론 과정</div>
      <div class="chain">`;
    steps.forEach(s => {
      html += `<div class="chain-step">
        <div class="chain-rule">∀x (${s.A}(x) → ${s.B}(x))</div>
        <div class="chain-ko">
          <b>${s.A}</b>(${name}) 참
          <span class="arrow">→</span>
          <span class="new">${s.B}(${name}) 도출!</span>
          &nbsp;→&nbsp; "${name}은(는) <b>${s.B}</b>이다"
        </div>
      </div>`;
    });
    html += `</div></div>`;

    // 새로 알게 된 것
    html += `<div>
      <div class="result-title">추론으로 새로 알게 된 것</div>
      <div class="derived-tags">`;
    [...derivedSet].forEach(p => {
      html += `<span class="tag derived">${p}(${name})</span>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div style="font-size:.85rem;color:#8aaa78">
      적용 가능한 ∀ 규칙이 없어 새로 도출된 사실이 없습니다.
    </div>`;
  }

  // ∃ 참고
  if (exNotes.length) {
    html += `<div class="ex-note">
      <div class="ex-note-title">∃ 참고 — 확인할 수 없지만 가능한 사실</div>`;
    exNotes.forEach(r => {
      html += `<div class="ex-note-item">
        "어떤 <b>${r.A}</b>은(는) <b>${r.B}</b>이다"
        → ${name}이(가) ${r.A}이므로, <b>${r.B}</b>일 수도 있습니다
        <span style="color:#6a8a9a;font-size:.74rem">(∃ 규칙은 확정적 추론 불가)</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('resultBox').innerHTML = html;
  document.getElementById('resultSection').style.display = '';
}

// ── 키 이벤트 ──────────────────────────────────────────────────────
document.getElementById('ruleB').addEventListener('keydown', e => { if(e.key==='Enter') addRule(); });
</script>
</body>
</html>
