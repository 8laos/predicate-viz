<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술어 논리 추론 도구</title>
<style>
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumMedium.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'KoPub World 돋움';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2102_ko@1.0/KoPubWorldDotumBold.woff') format('woff');
  font-weight: 700;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #6b8c63;
  color: #f2f1df;
  font-family: 'KoPub World 돋움', 'Malgun Gothic', sans-serif;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
h1 { font-size: 1.15rem; color: #f2f1df; }
.subtitle { font-size: .72rem; color: #b0c4a0; text-align: center; }

.section {
  width: 100%; max-width: 900px;
  background: #567050;
  border: 2px solid #4d6646;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sec-title {
  font-size: .92rem;
  font-weight: 700;
  color: #f2f1df;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-num {
  background: #e8a0aa;
  color: #2a1a1a;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700; flex-shrink: 0;
}

/* 술어 태그 */
.pred-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pred-tag {
  display: flex; align-items: center; gap: 4px;
  background: #4d6646; border: 1px solid #3d5236;
  border-radius: 16px; padding: 4px 10px;
  font-size: .82rem;
}
.pred-del { cursor: pointer; color: #e8a0aa; font-weight: 700; }
.pred-del:hover { color: #f0b0bc; }
.add-row { display: flex; gap: 6px; align-items: center; }
input[type=text] {
  padding: 6px 10px;
  background: #f2f1df; color: #2a3820;
  border: 2px solid #4d6646; border-radius: 7px;
  font-size: .85rem; font-family: inherit;
}
input[type=text]:focus { outline: none; border-color: #e8a0aa; }

/* 버튼 */
button {
  padding: 6px 14px; border: none; border-radius: 7px;
  cursor: pointer; font-size: .82rem; font-family: inherit;
  transition: background .12s;
}
.btn-add  { background: #4d6646; color: #f2f1df; }
.btn-add:hover  { background: #3d5236; }
.btn-main { background: #e8a0aa; color: #2a1a1a; font-weight: 700; }
.btn-main:hover { background: #f0b0bc; }
.btn-sm   { background: #425740; color: #c0d0b0; font-size: .75rem; padding: 4px 9px; }
.btn-sm:hover { background: #374d35; }

/* 학생 데이터 표 */
.table-wrap { overflow-x: auto; }
table { border-collapse: collapse; font-size: .82rem; }
th, td {
  border: 1px solid #4d6646;
  padding: 6px 10px;
  text-align: center;
  white-space: nowrap;
}
thead th { background: #4d6646; color: #f2f1df; font-weight: 700; }
thead th.pred-head { background: #3d5236; }
tbody td { background: #f2f1df; color: #2a3820; }
tbody tr:hover td { background: #e8f0d8; }
tbody td:first-child { background: #e0edcc; font-weight: 700; color: #2a3820; text-align: left; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #6b8c63; cursor: pointer; }
.del-row-btn { background: #7a3a3a; color: #fcc; border: none; border-radius: 4px; padding: 2px 7px; cursor: pointer; font-size: .75rem; }
.del-row-btn:hover { background: #6a2a2a; }

/* 분석 결과 */
.stmt-group { display: flex; flex-direction: column; gap: 6px; }
.stmt-label { font-size: .8rem; color: #b0c4a0; margin-bottom: 2px; font-weight: 700; }
.stmt-card {
  background: #4d6646;
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.stmt-card.universal  { border-left: 4px solid #4ade80; }
.stmt-card.existential{ border-left: 4px solid #93c5fd; }
.stmt-ko { font-size: .88rem; color: #f2f1df; }
.stmt-logic { font-size: .78rem; color: #b0c4a0; font-family: monospace; }
.stmt-ex { font-size: .74rem; color: #86d8a0; }
.empty-msg { font-size: .8rem; color: #7a9a70; font-style: italic; }

/* 추가 규칙 */
.rule-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.rule-card {
  background: #4d6646;
  border-left: 4px solid #e8a0aa;
  border-radius: 8px;
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: .85rem;
}
.rule-logic { color: #b0c4a0; font-family: monospace; font-size: .78rem; }
select {
  padding: 6px 10px;
  background: #f2f1df; color: #2a3820;
  border: 2px solid #4d6646; border-radius: 7px;
  font-size: .85rem; font-family: inherit;
}

/* 추론 입력 */
.infer-setup { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
.infer-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 5px; font-size: .85rem; background: #4d6646; padding: 4px 10px; border-radius: 14px; }

/* 추론 결과 */
.result-box {
  background: #425740;
  border-radius: 10px;
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.known-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 4px 12px; border-radius: 12px; font-size: .82rem; font-weight: 700;
}
.tag.known    { background: #4d7a5a; color: #c8f0d0; border: 1px solid #6aab7a; }
.tag.derived  { background: #b87080; color: #ffe8ec; border: 1px solid #d09098; }
.step-list { display: flex; flex-direction: column; gap: 6px; }
.step-item {
  background: #4d6646;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: .82rem;
  border-left: 3px solid #e8a0aa;
}
.step-rule { color: #b0c4a0; font-size: .75rem; font-family: monospace; }
.step-ko   { color: #f2f1df; margin-top: 2px; }
.step-derive { color: #f0b8c0; font-weight: 700; }
.exist-confirm { background: #3a5a6a; border-radius: 8px; padding: 8px 12px; font-size: .82rem; }
.exist-confirm .label { color: #93c5fd; font-weight: 700; margin-bottom: 4px; }
.two-col { display: flex; gap: 12px; flex-wrap: wrap; }
.two-col > * { flex: 1; min-width: 200px; }
</style>
</head>
<body>

<h1>🧠 술어 논리 추론 도구</h1>
<p class="subtitle">학생 데이터를 입력하면 데이터에서 모든/어떤 명제를 자동 도출하고<br>새 개체를 입력하면 ∀ 규칙으로 추론합니다</p>

<!-- ① 속성(술어) + 학생 데이터 -->
<div class="section">
  <div class="sec-title"><span class="sec-num">1</span> 속성(술어) 정의 및 학생 데이터</div>

  <div>
    <div style="font-size:.78rem;color:#b0c4a0;margin-bottom:6px">속성 목록</div>
    <div class="pred-tags" id="predTags"></div>
    <div class="add-row" style="margin-top:8px">
      <input type="text" id="newPred" placeholder="새 속성 입력 (예: 안경씀)" style="width:180px">
      <button class="btn-add" onclick="addPred()">+ 추가</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="dataTable"></table>
  </div>

  <div class="add-row">
    <input type="text" id="newStudent" placeholder="학생 이름" style="width:120px">
    <button class="btn-add" onclick="addStudent()">+ 학생 추가</button>
    <button class="btn-main" onclick="analyze()" style="margin-left:auto">🔍 데이터 분석</button>
  </div>
</div>

<!-- ② 데이터에서 도출된 명제 -->
<div class="section" id="analysisSection" style="display:none">
  <div class="sec-title"><span class="sec-num">2</span> 데이터에서 도출된 명제</div>
  <div class="two-col">
    <div>
      <div class="stmt-label">∀ (모든) — 데이터에서 항상 참인 것</div>
      <div class="stmt-group" id="universalList"></div>
    </div>
    <div>
      <div class="stmt-label">∃ (어떤) — 일부에서만 참인 것</div>
      <div class="stmt-group" id="existentialList"></div>
    </div>
  </div>
</div>

<!-- ③ 추가 ∀ 규칙 -->
<div class="section" id="ruleSection" style="display:none">
  <div class="sec-title"><span class="sec-num">3</span> 사용자 정의 ∀ 규칙 추가 <span style="font-size:.72rem;color:#b0c4a0;font-weight:400">(데이터 밖의 일반 규칙)</span></div>
  <div class="rule-row">
    <span style="font-size:.85rem">모든</span>
    <select id="ruleAnte"></select>
    <span style="font-size:.85rem">는(은)</span>
    <select id="ruleCons"></select>
    <span style="font-size:.85rem">다</span>
    <button class="btn-add" onclick="addRule()">+ 규칙 추가</button>
  </div>
  <div class="stmt-group" id="ruleList"></div>
</div>

<!-- ④ 새 개체 추론 -->
<div class="section" id="inferSection" style="display:none">
  <div class="sec-title"><span class="sec-num">4</span> 새 개체 입력 → 추론</div>
  <div class="infer-setup">
    <input type="text" id="inferName" placeholder="이름 (예: 지민)" style="width:130px">
    <div>
      <div style="font-size:.75rem;color:#b0c4a0;margin-bottom:5px">알고 있는 속성 선택</div>
      <div class="infer-checks" id="inferChecks"></div>
    </div>
    <button class="btn-main" onclick="doInfer()" style="align-self:flex-end">▶ 추론하기</button>
  </div>
  <div id="inferResult"></div>
</div>

<script>
'use strict';

// ── 상태 ──────────────────────────────────────────────────────────
let predicates = ['학생', '수업듣다', '안경씀', '서울출신'];
let students = [
  {name:'민수', props:{학생:1, 수업듣다:1, 안경씀:1, 서울출신:1}},
  {name:'영희', props:{학생:1, 수업듣다:1, 안경씀:0, 서울출신:0}},
  {name:'철수', props:{학생:1, 수업듣다:1, 안경씀:1, 서울출신:0}},
  {name:'지수', props:{학생:1, 수업듣다:1, 안경씀:0, 서울출신:0}},
  {name:'현우', props:{학생:1, 수업듣다:1, 안경씀:0, 서울출신:1}},
];
let userRules = []; // {ante, cons}
let derivedUniversals = []; // from analysis

// ── 술어 관리 ──────────────────────────────────────────────────────
function renderPreds() {
  const el = document.getElementById('predTags');
  el.innerHTML = predicates.map(p=>`
    <span class="pred-tag">
      ${p}
      <span class="pred-del" onclick="delPred('${p}')">✕</span>
    </span>`).join('');
}

function addPred() {
  const v = document.getElementById('newPred').value.trim();
  if (!v || predicates.includes(v)) return;
  predicates.push(v);
  students.forEach(s => { if (!(v in s.props)) s.props[v] = 0; });
  document.getElementById('newPred').value = '';
  renderAll();
}

function delPred(p) {
  predicates = predicates.filter(x => x !== p);
  students.forEach(s => delete s.props[p]);
  renderAll();
}

// ── 학생 표 ────────────────────────────────────────────────────────
function renderTable() {
  const tbl = document.getElementById('dataTable');
  let html = '<thead><tr><th>이름</th>';
  predicates.forEach(p => { html += `<th class="pred-head">${p}</th>`; });
  html += '<th></th></tr></thead><tbody>';
  students.forEach((s, si) => {
    html += `<tr><td>${s.name}</td>`;
    predicates.forEach(p => {
      html += `<td><input type="checkbox" ${s.props[p]?'checked':''} onchange="toggleProp(${si},'${p}',this.checked)"></td>`;
    });
    html += `<td><button class="del-row-btn" onclick="delStudent(${si})">삭제</button></td></tr>`;
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

function addStudent() {
  const v = document.getElementById('newStudent').value.trim();
  if (!v) return;
  const props = {};
  predicates.forEach(p => props[p] = 0);
  students.push({name: v, props});
  document.getElementById('newStudent').value = '';
  renderTable();
}

function delStudent(i) { students.splice(i, 1); renderTable(); }

function toggleProp(si, p, val) { students[si].props[p] = val ? 1 : 0; }

// ── 데이터 분석 ────────────────────────────────────────────────────
function analyzeData() {
  const universals = [], existentials = [];
  for (const ante of predicates) {
    for (const cons of predicates) {
      if (ante === cons) continue;
      const withAnte = students.filter(s => s.props[ante]);
      if (!withAnte.length) continue;
      const withBoth = withAnte.filter(s => s.props[cons]);
      if (withBoth.length === withAnte.length)
        universals.push({ante, cons, examples: withAnte.map(s=>s.name)});
      else if (withBoth.length > 0)
        existentials.push({ante, cons, examples: withBoth.map(s=>s.name)});
    }
  }
  return {universals, existentials};
}

function analyze() {
  const {universals, existentials} = analyzeData();
  derivedUniversals = universals;

  // ∀ 목록
  const ul = document.getElementById('universalList');
  ul.innerHTML = universals.length ? universals.map(u=>`
    <div class="stmt-card universal">
      <div class="stmt-ko">모든 <b>${u.ante}</b>는 <b>${u.cons}</b>다</div>
      <div class="stmt-logic">∀x (${u.ante}(x) → ${u.cons}(x))</div>
      <div class="stmt-ex">해당: ${u.examples.join(', ')}</div>
    </div>`).join('') : '<div class="empty-msg">해당 없음</div>';

  // ∃ 목록
  const el = document.getElementById('existentialList');
  el.innerHTML = existentials.length ? existentials.map(e=>`
    <div class="stmt-card existential">
      <div class="stmt-ko">어떤 <b>${e.ante}</b>는 <b>${e.cons}</b>다</div>
      <div class="stmt-logic">∃x (${e.ante}(x) ∧ ${e.cons}(x))</div>
      <div class="stmt-ex">예시: ${e.examples.join(', ')}</div>
    </div>`).join('') : '<div class="empty-msg">해당 없음</div>';

  // 규칙 선택박스 갱신
  ['ruleAnte','ruleCons'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = predicates.map(p=>`<option value="${p}" ${p===cur?'selected':''}>${p}</option>`).join('');
  });

  // 추론 체크박스 갱신
  const ic = document.getElementById('inferChecks');
  ic.innerHTML = predicates.map(p=>`
    <label class="check-item">
      <input type="checkbox" value="${p}"> ${p}
    </label>`).join('');

  document.getElementById('analysisSection').style.display = '';
  document.getElementById('ruleSection').style.display = '';
  document.getElementById('inferSection').style.display = '';
  document.getElementById('inferResult').innerHTML = '';
}

// ── 규칙 관리 ──────────────────────────────────────────────────────
function addRule() {
  const ante = document.getElementById('ruleAnte').value;
  const cons = document.getElementById('ruleCons').value;
  if (ante === cons) return;
  if (userRules.find(r => r.ante===ante && r.cons===cons)) return;
  userRules.push({ante, cons});
  renderRules();
}

function renderRules() {
  const el = document.getElementById('ruleList');
  el.innerHTML = userRules.length ? userRules.map((r,i)=>`
    <div class="rule-card">
      <div>
        <span>모든 <b>${r.ante}</b>는 <b>${r.cons}</b>다</span>
        <div class="rule-logic">∀x (${r.ante}(x) → ${r.cons}(x))</div>
      </div>
      <button class="btn-sm" onclick="delRule(${i})" style="margin-left:auto">삭제</button>
    </div>`).join('') : '<div class="empty-msg">추가된 규칙 없음</div>';
}

function delRule(i) { userRules.splice(i,1); renderRules(); }

// ── 추론 ──────────────────────────────────────────────────────────
function doInfer() {
  const name = document.getElementById('inferName').value.trim() || '???';
  const checked = [...document.querySelectorAll('#inferChecks input:checked')].map(el=>el.value);
  if (!checked.length) { alert('속성을 하나 이상 선택해주세요'); return; }

  const known = new Set(checked);
  const steps = [];

  // 사용 가능한 ∀ 규칙: 데이터 도출 + 사용자 정의
  const allRules = [
    ...derivedUniversals.map(u=>({ante:u.ante,cons:u.cons,source:'데이터'})),
    ...userRules.map(r=>({...r,source:'사용자 규칙'})),
  ];

  let changed = true;
  while (changed) {
    changed = false;
    for (const rule of allRules) {
      if (known.has(rule.ante) && !known.has(rule.cons)) {
        known.add(rule.cons);
        steps.push(rule);
        changed = true;
      }
    }
  }

  // ∃ 확인: 어떤 ∃ 명제를 이 개체가 확인해주나?
  const {existentials} = analyzeData();
  const confirmed = existentials.filter(e => known.has(e.ante) && known.has(e.cons));

  // 결과 렌더링
  const derivedProps = steps.map(s=>s.cons);
  const initialProps = checked;

  let html = `<div class="result-box">`;

  html += `<div>
    <div style="font-size:.78rem;color:#b0c4a0;margin-bottom:5px">📌 ${name}에 대해 알 수 있는 것</div>
    <div class="known-tags">`;
  [...known].forEach(p => {
    const isDerived = derivedProps.includes(p) && !initialProps.includes(p);
    html += `<span class="tag ${isDerived?'derived':'known'}">${p}(${name})</span>`;
  });
  html += `</div>
    <div style="font-size:.72rem;color:#8aaa78;margin-top:5px">
      초록 = 처음부터 알던 것 &nbsp;|&nbsp; 분홍 = 추론으로 새로 알게 된 것
    </div></div>`;

  if (steps.length) {
    html += `<div>
      <div style="font-size:.78rem;color:#b0c4a0;margin-bottom:5px">📎 추론 과정 (∀ 규칙 적용)</div>
      <div class="step-list">`;
    steps.forEach((s,i) => {
      html += `<div class="step-item">
        <div class="step-rule">∀x (${s.ante}(x) → ${s.cons}(x)) &nbsp;[${s.source}]</div>
        <div class="step-ko">
          ${s.ante}(${name}) 이(가) 참 →
          <span class="step-derive">${s.cons}(${name}) 도출!</span>
          &nbsp;→&nbsp; "${name}는 ${s.cons}다"
        </div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div style="font-size:.82rem;color:#7a9a70">적용 가능한 ∀ 규칙이 없어 새로 도출된 사실이 없습니다.</div>`;
  }

  if (confirmed.length) {
    html += `<div class="exist-confirm">
      <div class="label">✅ ∃ 확인 — ${name}가 이 '어떤' 명제의 실제 예시입니다</div>`;
    confirmed.forEach(e => {
      html += `<div style="font-size:.82rem;margin-top:4px">
        "어떤 <b>${e.ante}</b>는 <b>${e.cons}</b>다"
        <span style="color:#93c5fd">[∃x (${e.ante}(x) ∧ ${e.cons}(x))]</span>
        → ${name}가 바로 그 예시!
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('inferResult').innerHTML = html;
}

// ── 전체 렌더 ──────────────────────────────────────────────────────
function renderAll() {
  renderPreds();
  renderTable();
  renderRules();
}

document.getElementById('newPred').addEventListener('keydown', e => { if(e.key==='Enter') addPred(); });
document.getElementById('newStudent').addEventListener('keydown', e => { if(e.key==='Enter') addStudent(); });

renderAll();
</script>
</body>
</html>
